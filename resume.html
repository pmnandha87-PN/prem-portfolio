<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Resume preview for Prem Nandha, aspiring Full Stack Developer and AI enthusiast."
    />
    <title>Prem Nandha | Resume</title>
    <style>
      :root {
        --bg: #eff5f8;
        --surface: rgba(255, 255, 255, 0.9);
        --surface-soft: rgba(255, 255, 255, 0.72);
        --text: #111827;
        --muted: #5b6779;
        --line: rgba(17, 24, 39, 0.12);
        --accent: #0f766e;
        --accent-2: #0284c7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(15, 118, 110, 0.08) 1px, transparent 1px),
          linear-gradient(180deg, rgba(15, 118, 110, 0.08) 1px, transparent 1px),
          linear-gradient(135deg, #f7fbfd, var(--bg));
        background-size: 44px 44px, 44px 44px, auto;
        color: var(--text);
        font-family: Inter, Arial, Helvetica, sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .shell {
        width: min(1120px, calc(100% - 2rem));
        margin: 1.5rem auto;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
        backdrop-filter: blur(12px);
      }

      .hero {
        padding: 1.4rem;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 0.88rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      h1 {
        margin: 0.55rem 0 0;
        font-size: clamp(2.3rem, 6vw, 4rem);
        line-height: 1.02;
      }

      p {
        margin: 0;
      }

      .copy {
        margin-top: 0.85rem;
        max-width: 760px;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.75;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1.2rem;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0.8rem 1rem;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--surface-soft);
        color: var(--text);
        font-weight: 800;
      }

      .button.primary {
        border: 0;
        color: #ffffff;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
      }

      .viewer {
        margin-top: 1rem;
        overflow: hidden;
      }

      .frame-wrap {
        padding: 0.9rem;
      }

      .frame {
        width: 100%;
        height: min(82vh, 980px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
      }

      .fallback {
        display: grid;
        place-items: center;
        min-height: 360px;
        padding: 1.5rem;
        text-align: center;
      }

      .fallback p {
        max-width: 560px;
        color: var(--muted);
        line-height: 1.7;
      }

      @media (max-width: 700px) {
        .shell {
          width: min(100%, calc(100% - 1rem));
          margin: 0.5rem auto 1rem;
        }

        .hero {
          padding: 1rem;
        }

        .actions > * {
          width: 100%;
        }

        .frame-wrap {
          padding: 0.65rem;
        }

        .frame {
          height: 72vh;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="panel hero">
        <p class="eyebrow">Resume</p>
        <h1>Prem Nandha</h1>
        <p class="copy">
          This page previews the current PDF resume used by the portfolio, so any update to the resume file appears here too.
        </p>
        <div class="actions">
          <a class="button primary" href="Prem-Nandha-Resume.pdf" target="_blank" rel="noreferrer">Open Full PDF</a>
          <a class="button" href="Prem-Nandha-Resume.pdf" download="Prem-Nandha-Resume.pdf">Download PDF Resume</a>
          <a class="button" href="index.html">Back to Portfolio</a>
        </div>
      </section>

      <section class="panel viewer">
        <div class="frame-wrap">
          <object
            class="frame"
            data="Prem-Nandha-Resume.pdf#toolbar=1&navpanes=0&scrollbar=1"
            type="application/pdf"
          >
            <div class="fallback">
              <div>
                <p>
                  Your browser is not showing the PDF preview here. Use the buttons above to open or download the latest resume.
                </p>
              </div>
            </div>
          </object>
        </div>
      </section>
    </main>
  </body>
</html>
